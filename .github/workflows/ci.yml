name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Test local-lab scripts
        run: bash tests/test-lab.sh
