name: Release

on:
  push:
    branches: [main]
    paths: [VERSION]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare main release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]
          tag="v$version"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag"; then
            echo "tag $tag already exists; bump VERSION before releasing" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build Linux ${{ matrix.goarch }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true
      - name: Test
        run: go test ./...
      - name: Build signed-release package
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          asset="cloudpanel-gateway_${VERSION}_linux_${GOARCH}"
          CGO_ENABLED=0 GOOS=linux GOARCH="$GOARCH" \
            go build -trimpath -ldflags="-s -w -X github.com/psng-tech/cloudpanel-gateway/internal/gateway.Version=$VERSION" \
            -o "$asset" ./cmd/cloudpanel-gateway
          mkdir -p package/deploy/systemd
          install -m 0755 "$asset" package/cloudpanel-gateway
          install -m 0644 deploy/systemd/*.service package/deploy/systemd/
          tar --sort=name --owner=0 --group=0 --numeric-owner \
            -C package -czf "$asset.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goarch }}
          path: cloudpanel-gateway_${{ needs.prepare.outputs.version }}_linux_${{ matrix.goarch }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  release:
    name: Sign and publish
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Install Minisign
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends minisign
      - name: Sign packages and checksum manifest
        working-directory: release
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          test -n "$MINISIGN_SECRET_KEY"
          test -n "$MINISIGN_PASSWORD"
          printf '%s' "$MINISIGN_SECRET_KEY" | base64 --decode > minisign.key
          chmod 600 minisign.key
          sha256sum cloudpanel-gateway_*.tar.gz > SHA256SUMS
          for asset in cloudpanel-gateway_*.tar.gz SHA256SUMS; do
            minisign -S -s minisign.key -m "$asset" -x "$asset.minisig" -P "$MINISIGN_PASSWORD"
          done
          rm -f minisign.key
      - name: Attest release packages
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/cloudpanel-gateway_*.tar.gz
      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release create "$TAG" release/* \
            --target "$GITHUB_SHA" \
            --title "CloudPanel Gateway $TAG" \
            --generate-notes
